services:
  postgres-petshop:
    image: postgres:15-alpine
    container_name: postgres_petshop
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-petshop-volume:/var/lib/postgresql/data

  api:
    container_name: api_petshop
    build:
      context: .
      target: development
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres-petshop

volumes:
  postgres-petshop-volume:
    